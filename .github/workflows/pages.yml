name: Deploy static site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Build
        run: npm run build
        env:
          SITE_URL: ${{ vars.SITE_URL }}
          CUSTOM_DOMAIN: ${{ vars.CUSTOM_DOMAIN }}
          GA_MEASUREMENT_ID: ${{ vars.GA_MEASUREMENT_ID }}
          ADSENSE_CLIENT: ${{ vars.ADSENSE_CLIENT }}
          ADS_TXT_ACCOUNT: ${{ vars.ADS_TXT_ACCOUNT }}
          CONTACT_EMAIL: ${{ vars.CONTACT_EMAIL }}

      - name: Check
        run: npm run check

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
